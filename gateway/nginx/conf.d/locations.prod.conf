# ====================
# MINIO (Media)
# ====================
server {
    listen 80;
    server_name media.topvnsport.com;
    client_max_body_size 100M;
    
    location / {
        proxy_pass http://minio;
        proxy_set_header Host $host;
    }
}

# ====================
# HEALTH CHECK (Default)
# ====================
server {
    listen 80 default_server;
    server_name _;
    
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    location / {
        return 444;
    }
}
