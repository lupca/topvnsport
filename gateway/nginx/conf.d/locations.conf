server {
    listen 80;
    server_name localhost;

    # ====================
    # INTERNAL AUTH ENDPOINT
    # ====================

    location = /auth_verify {
        internal;

        proxy_pass http://identity_api/auth/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;

        # Forward the Authorization header to Identity Service
        proxy_set_header Authorization $http_authorization;
        # Also check for cookie-based auth
        proxy_set_header Cookie $http_cookie;
    }

    # ====================
    # IDENTITY SERVICE (NO AUTH for /auth/*)
    # ====================

    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://identity_api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Clear any client-sent auth headers (security)
        proxy_set_header X-User-Id "";
        proxy_set_header X-User-Username "";
        proxy_set_header X-User-Role "";
        proxy_set_header X-User-Permissions "";
    }

    # Identity management API (requires auth)
    location /api/identity/ {
        auth_request /auth_verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_permissions $upstream_http_x_user_permissions;

        error_page 401 = @auth_error;

        rewrite ^/api/identity/(.*)$ /$1 break;

        proxy_pass http://identity_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Inject authenticated user headers
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Username $auth_user_username;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Permissions $auth_user_permissions;
    }

    # ====================
    # PMI SERVICE
    # ====================

    location /api/pmi/public/ {
        auth_request off;
        rewrite ^/api/pmi/(.*)$ /$1 break;
        proxy_pass http://pmi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/pmi/ {
        auth_request /auth_verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_permissions $upstream_http_x_user_permissions;

        error_page 401 = @auth_error;

        rewrite ^/api/pmi/(.*)$ /$1 break;

        proxy_pass http://pmi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Username $auth_user_username;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Permissions $auth_user_permissions;
    }

    # ====================
    # OMS SERVICE
    # ====================

    location /api/oms/ {
        auth_request /auth_verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_permissions $upstream_http_x_user_permissions;

        error_page 401 = @auth_error;

        rewrite ^/api/oms/(.*)$ /$1 break;

        proxy_pass http://oms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Username $auth_user_username;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Permissions $auth_user_permissions;
    }

    # ====================
    # WMS SERVICE
    # ====================

    location /api/wms/ {
        auth_request /auth_verify;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_user_username $upstream_http_x_user_username;
        auth_request_set $auth_user_role $upstream_http_x_user_role;
        auth_request_set $auth_user_permissions $upstream_http_x_user_permissions;

        error_page 401 = @auth_error;

        rewrite ^/api/wms/(.*)$ /$1 break;

        proxy_pass http://wms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-User-Username $auth_user_username;
        proxy_set_header X-User-Role $auth_user_role;
        proxy_set_header X-User-Permissions $auth_user_permissions;
    }

    # ====================
    # SERVICE-TO-SERVICE (INTERNAL)
    # ====================

    # Internal endpoints for OMS/WMS calling PMI
    # Uses X-API-Key, bypasses auth_request
    location /internal/pmi/ {
        # Only allow from Docker internal networks
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;

        rewrite ^/internal/pmi/(.*)$ /api/$1 break;

        proxy_pass http://pmi_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Keep X-API-Key header from calling service
    }

    location /internal/oms/ {
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        deny all;

        rewrite ^/internal/oms/(.*)$ /api/$1 break;

        proxy_pass http://oms_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ====================
    # AUTH ERROR HANDLER
    # ====================

    location @auth_error {
        default_type application/json;
        return 401 '{"detail": "Unauthorized - Please login"}';
    }

    # ====================
    # HEALTH CHECK
    # ====================

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ====================
    # DEFAULT - Identity Frontend
    # ====================

    location / {
        proxy_pass http://identity_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
