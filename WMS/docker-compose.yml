services:
  wms-db:
    image: postgres:15-alpine
    container_name: wms-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=wms_db
    ports:
      - "15435:5432"
    volumes:
      - wms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  wms-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: wms-api
    ports:
      - "18102:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@wms-db:5432/wms_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-identity_jwt_secret_key_2026_change_me_in_prod}
    depends_on:
      wms-db:
        condition: service_healthy
    networks:
      - default
      - oms_default
      - pmi_default
      - gateway_network
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./backend/requirements.txt

  wms_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: wms_frontend
    restart: always
    ports:
      - "13102:3002"
    environment:
      - NEXT_PUBLIC_WMS_API_URL=http://localhost:18102
    depends_on:
      - wms-api
    networks:
      - default
      - oms_default
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json

networks:
  default:
    name: wms_default
    external: true
  oms_default:
    external: true
  pmi_default:
    external: true
  gateway_network:
    external: true

volumes:
  wms_pgdata:
