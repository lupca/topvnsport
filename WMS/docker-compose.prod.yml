services:
  wms-db:
    image: postgres:15-alpine
    container_name: wms-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=wms_db
    ports:
      - "15435:5432"
    volumes:
      - wms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  wms-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-api
    restart: always
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@wms-db:5432/wms_db
      - CORS_ALLOWED_ORIGINS=http://topvnsport.com,http://www.topvnsport.com,http://pmi.topvnsport.com,http://oms.topvnsport.com,http://wms.topvnsport.com
    depends_on:
      wms-db:
        condition: service_healthy
    networks:
      - default
      - oms_default
      - pmi_default

  wms_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://api-wms.topvnsport.com
        - NEXT_PUBLIC_WMS_API_URL=http://api-wms.topvnsport.com
        - NEXT_PUBLIC_PMI_API_URL=http://api-pmi.topvnsport.com
        - NEXT_PUBLIC_IDENTITY_URL=http://identity.topvnsport.com
    container_name: wms_frontend
    restart: always
    depends_on:
      - wms-api
    networks:
      - default
      - oms_default
      - pmi_default

networks:
  default:
    name: wms_default
    external: true
  oms_default:
    external: true
  pmi_default:
    external: true

volumes:
  wms_pgdata:
