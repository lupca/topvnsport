services:
  wms-db:
    image: postgres:15-alpine
    container_name: wms-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=wms_db
    ports:
      - "15435:5432"
    volumes:
      - wms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  wms-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-api
    restart: always
    ports:
      - "18102:8002"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@wms-db:5432/wms_db
      - CORS_ALLOWED_ORIGINS=http://${PUBLIC_HOST:-localhost}:13100,http://${PUBLIC_HOST:-localhost}:13101,http://${PUBLIC_HOST:-localhost}:13102,http://${PUBLIC_HOST:-localhost}:13103
    depends_on:
      wms-db:
        condition: service_healthy
    networks:
      - default
      - oms_default
      - pmi_default

  wms_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wms_frontend
    restart: always
    ports:
      - "13102:3002"
    environment:
      - NEXT_PUBLIC_WMS_API_URL=http://${PUBLIC_HOST:-localhost}:18102
    depends_on:
      - wms-api
    networks:
      - default
      - oms_default
      - pmi_default

networks:
  default:
    name: wms_default
    external: true
  oms_default:
    external: true
  pmi_default:
    external: true

volumes:
  wms_pgdata:
