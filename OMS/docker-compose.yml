services:
  oms_db:
    image: postgres:15-alpine
    container_name: oms_db
    restart: always
    environment:
      POSTGRES_DB: oms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15434:5432"
    volumes:
      - oms_db_data:/var/lib/postgresql/data

  oms_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: oms_backend
    restart: always
    ports:
      - "18101:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@oms_db:5432/oms_db
    depends_on:
      - oms_db
    networks:
      - default
      - pmi_default
      - wms_default
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./backend/requirements.txt

  oms_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oms_frontend
    restart: always
    ports:
      - "13101:3001"
    environment:
      - NEXT_PUBLIC_OMS_API_URL=http://localhost:18101
    depends_on:
      - oms_backend
    networks:
      - default
      - pmi_default
      - wms_default
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json

networks:
  pmi_default:
    external: true
  wms_default:
    external: true

volumes:
  oms_db_data:
