services:
  db:
    image: postgres:15-alpine
    container_name: pim-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pim_db
    ports:
      - "15433:5432" # Dedicated host port for PMI Postgres to avoid local conflicts
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: pim-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "19005:9000" # Dedicated host port for PMI MinIO API
      - "19006:9001" # Dedicated host port for PMI MinIO Console
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pim-api
    ports:
      - "18100:8000"
    networks:
      - default
      - gateway_network
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pim_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_BASE_URL=http://localhost:19005
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=False
      - MINIO_BUCKET=pim-media
      - TESTING=true
      - JWT_SECRET_KEY=identity_jwt_secret_key_2026_change_me_in_prod
      - INTERNAL_SERVICE_TOKEN=oms_wms_internal_api_key_secret_2026
      - ALLOWED_SERVICE_KEYS=valid-service-api-key-123
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pim-frontend
    ports:
      - "13100:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:18100
    depends_on:
      - api
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json

volumes:
  pgdata:
  miniodata:

networks:
  default:
    name: pmi_default
    external: true
  gateway_network:
    external: true
