name: E2E Tests

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      subsystem:
        description: 'Which subsystem to test (all, pmi, oms, wms)'
        required: false
        default: 'all'
  
  # Nightly at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Full Flow E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-e2e-${{ hashFiles('e2e_tests/requirements.txt') }}
      
      - name: Prepare web env file
        run: |
          if [ -f web/.env.example ]; then
            cp web/.env.example web/.env
          else
            touch web/.env
          fi
      
      - name: Start all services
        run: |
          chmod +x start_all.sh
          ./start_all.sh --no-watch
      
      - name: Wait for HTTP readiness
        run: |
          python - <<'PY'
          import sys, time
          from urllib.request import urlopen
          
          checks = {
              "PMI API": "http://localhost:18100/docs",
              "OMS API": "http://localhost:18101/",
              "WMS API": "http://localhost:18102/status",
              "WEB Frontend": "http://localhost:13103/",
              "OMS Frontend": "http://localhost:13101/settings/sms",
          }
          
          deadline = time.time() + 300
          while time.time() < deadline:
              failed = []
              for name, url in checks.items():
                  try:
                      with urlopen(url, timeout=5.0) as r:
                          if r.status != 200:
                              failed.append(f"{name}: {r.status}")
                  except Exception as e:
                      failed.append(f"{name}: {e}")
              
              if not failed:
                  print("All services ready")
                  sys.exit(0)
              
              time.sleep(5)
          
          print("Readiness timeout:")
          for f in failed:
              print(f"  - {f}")
          sys.exit(1)
          PY
      
      - name: Install E2E dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r e2e_tests/requirements.txt
      
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: pytest e2e_tests/ -v --tracing retain-on-failure --video retain-on-failure
      
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      
      - name: Tear down services
        if: always()
        run: |
          docker compose -f web/docker-compose.yml down -v || true
          docker compose -f WMS/docker-compose.yml down -v || true
          docker compose -f OMS/docker-compose.yml down -v || true
          docker compose -f PMI/docker-compose.yml down -v || true
