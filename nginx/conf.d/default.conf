# Cửa hàng chính
server {
    listen 80;
    server_name topvnsport.com www.topvnsport.com;
    location / {
        proxy_pass http://web_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Hệ thống PMI
server {
    listen 80;
    server_name pmi.topvnsport.com;
    location / {
        proxy_pass http://pim-frontend:3000;
        proxy_set_header Host $host;
    }
}
server {
    listen 80;
    server_name api-pmi.topvnsport.com;
    location / {
        proxy_pass http://pim-api:8000;
        proxy_set_header Host $host;
    }
}

# Hệ thống OMS
server {
