# Identity Service (SSO)
server {
    listen 80;
    server_name identity.topvnsport.com;
    location / {
        proxy_pass http://identity-frontend-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
server {
    listen 80;
    server_name api-identity.topvnsport.com;
    location / {
        proxy_pass http://identity-api-prod:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Hệ thống MinIO
server {
    listen 80;
    server_name media.topvnsport.com;
    client_max_body_size 100M;
    location / {
        proxy_pass http://pim-minio:9000;
        proxy_set_header Host $host;
    }
}
